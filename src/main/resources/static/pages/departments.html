<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMS – Departments</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🏢</span>
    <span class="brand-name">EMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="employees.html" class="nav-link">👥 Employees</a>
    <a href="add-employee.html" class="nav-link">➕ Add Employee</a>
    <a href="departments.html" class="nav-link active">🏗️ Departments</a>
  </nav>
  <div class="sidebar-footer">
    <span id="admin-name">Admin</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">Departments</div>
    <button class="btn btn-primary" onclick="openAddDeptModal()">+ Add Department</button>
  </div>

  <div class="page-content">
    <div id="dept-grid" class="dept-grid"></div>
  </div>
</div>

<!-- Add/Edit Department Modal -->
<div id="dept-modal" class="modal-backdrop" style="display:none;">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3 id="dept-modal-title">Add Department</h3>
      <button class="modal-close" onclick="closeDeptModal()">✕</button>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label>Department Name <span class="required">*</span></label>
      <input type="text" id="dept-name-input" placeholder="e.g. Product"/>
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="dept-icon-input" placeholder="e.g. 🚀" maxlength="4"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="dept-desc-input" placeholder="Short description"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeptModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDept()">Save</button>
    </div>
  </div>
</div>

<!-- Delete Dept Confirm -->
<div id="del-dept-modal" class="modal-backdrop" style="display:none;">
  <div class="modal modal-sm">
    <div class="modal-header"><h3>Delete Department</h3></div>
    <p style="margin:12px 0 20px;">Delete <strong id="del-dept-name"></strong>? Employees in this dept won't be deleted.</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDelDeptModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelDept()">Delete</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/departments.js"></script>
</body>
</html>
