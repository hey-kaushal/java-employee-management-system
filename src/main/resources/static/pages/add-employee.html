<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMS – Add Employee</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🏢</span>
    <span class="brand-name">EMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="employees.html" class="nav-link">👥 Employees</a>
    <a href="add-employee.html" class="nav-link active">➕ Add Employee</a>
    <a href="departments.html" class="nav-link">🏗️ Departments</a>
  </nav>
  <div class="sidebar-footer">
    <span id="admin-name">Admin</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-title" id="form-page-title">Add Employee</div>
    <a href="employees.html" class="btn btn-secondary">← Back</a>
  </div>

  <div class="page-content">
    <div class="card form-card">
      <div id="form-error" class="alert alert-danger" style="display:none;"></div>

      <div class="form-section-title">Personal Information</div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" id="f-name" placeholder="e.g. Priya Sharma"/>
        </div>
        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <input type="email" id="f-email" placeholder="priya@company.com"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="f-phone" placeholder="9876543210"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="f-gender">
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-title">Job Information</div>
      <div class="form-row">
        <div class="form-group">
          <label>Department <span class="required">*</span></label>
          <select id="f-dept">
            <option value="">Select Department</option>
          </select>
        </div>
        <div class="form-group">
          <label>Role / Designation <span class="required">*</span></label>
          <input type="text" id="f-role" placeholder="e.g. Senior Developer"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Salary (₹ per annum)</label>
          <input type="number" id="f-salary" placeholder="75000" min="0"/>
        </div>
        <div class="form-group">
          <label>Date of Joining</label>
          <input type="date" id="f-joined"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Employment Type</label>
          <select id="f-type">
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Contract">Contract</option>
            <option value="Intern">Intern</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="window.location.href='employees.html'">Cancel</button>
        <button class="btn btn-primary" onclick="saveEmployee()" id="save-btn">Save Employee</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/employee-form.js"></script>
</body>
</html>
