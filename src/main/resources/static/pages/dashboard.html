<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMS – Dashboard</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">🏢</span>
    <span class="brand-name">EMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-link active">📊 Dashboard</a>
    <a href="employees.html" class="nav-link">👥 Employees</a>
    <a href="add-employee.html" class="nav-link">➕ Add Employee</a>
    <a href="departments.html" class="nav-link">🏗️ Departments</a>
  </nav>
  <div class="sidebar-footer">
    <span id="admin-name">Admin</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">Dashboard</div>
    <div class="topbar-user"><span id="topbar-user"></span></div>
  </div>

  <div class="page-content">
    <!-- Metrics -->
    <div class="metrics-grid" id="metrics-grid"></div>

    <!-- Charts Row -->
    <div class="dashboard-row">
      <div class="card">
        <div class="card-header">Department Headcount</div>
        <div id="dept-chart"></div>
      </div>
      <div class="card">
        <div class="card-header">Recent Employees</div>
        <table class="table" id="recent-table">
          <thead><tr><th>Name</th><th>Department</th><th>Status</th></tr></thead>
          <tbody id="recent-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
